<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HAURAN • Visual Echoes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Amiri:wght@400;700&display=swap');

    body {
      font-family: 'Playfair Display', serif;
      min-height: 100vh;
      overflow-x: hidden;
      background-size: cover;
      background-position: center;
      transition: background-image 2s ease;
    }

    .title { color: #d4af77; text-shadow: 0 6px 20px rgba(0,0,0,0.9); letter-spacing: 8px; }
    .arabic-title { font-family: 'Amiri', serif; color: #d4af77; letter-spacing: 10px; }

    .frame {
      background: #f5e8c7;
      padding: 10px 8px 32px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.75), inset 0 0 25px rgba(139,69,19,0.4), 0 0 0 8px #3c2f1f;
      border-radius: 8px;
      transition: all 1.1s cubic-bezier(0.68, -0.55, 0.27, 1.55);
      position: absolute;
      width: 200px;
      cursor: pointer;
    }

    .media-container {
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      border-radius: 6px;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.4);
    }

    .media-container img, .media-container video {
      width: 100%; height: 100%; object-fit: cover;
    }

    .gallery-container {
      position: relative;
      width: 100%;
      height: 720px;
      margin: 40px auto;
    }

    .input-box {
      background: rgba(255,255,255,0.95);
      border: 3px solid #3c2f1f;
      box-shadow: 0 15px 30px rgba(0,0,0,0.5);
      width: 340px;
    }

    .delete-btn {
      position: absolute;
      top: -8px;
      right: -8px;
      background: #ef4444;
      color: white;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.4);
      z-index: 20;
    }
  </style>
</head>
<body>

  <div class="max-w-7xl mx-auto py-8 px-8 relative">

    <!-- المعرض -->
    <div id="gallery" class="gallery-container mx-auto"></div>

    <!-- العنوان ونافذة الإضافة تحت الصور -->
    <div class="text-center mt-12">
      <h1 class="title text-5xl md:text-6xl font-bold">HAURAN</h1>
      <h2 class="arabic-title text-3xl md:text-4xl mt-1">صدى بصري</h2>
      <p class="text-amber-200 text-sm mt-4">Visual Echoes • معرض الإطارات القديمة</p>
    </div>

    <div class="flex justify-center mt-8">
      <div class="input-box rounded-3xl p-5">
        <p class="text-gray-800 text-xs font-medium mb-3 text-center">Paste X link or image link</p>
        <div class="flex gap-3">
          <input id="mediaUrl" type="text" placeholder="https://x.com/..." 
                 class="flex-1 px-5 py-4 text-gray-900 rounded-2xl text-sm focus:outline-none">
          <button onclick="addMedia()" 
                  class="bg-[#8b4513] hover:bg-[#a67c52] text-white px-8 rounded-2xl text-sm font-semibold">
            ADD
          </button>
        </div>
      </div>
    </div>

  </div>

  <script>
    const gallery = document.getElementById('gallery');
    const input = document.getElementById('mediaUrl');

    const backgrounds = [
      "https://i.postimg.cc/zDdkCHDw/grok-image-9mfqxn.jpg",
      "https://i.postimg.cc/SQZG6YQC/grok-image-4afwje.jpg",
      "https://i.postimg.cc/tRrz3nRh/1764331802928.png",
      "https://i.postimg.cc/NjnVpPgf/grok-image-xsbycz4.jpg",
      "https://i.postimg.cc/RZhy1zzr/grok-image-ri3grh.jpg"
    ];

    let mediaList = JSON.parse(localStorage.getItem('hauranGallery')) || [];

    function extractImageUrl(url) {
      url = url.trim();
      if (url.includes('pbs.twimg.com/media/')) return url;

      const statusMatch = url.match(/status\/(\d+)/);
      const photoMatch = url.match(/photo\/(\d+)/);
      
      if (statusMatch) {
        const statusId = statusMatch[1];
        const photoNum = photoMatch ? photoMatch[1] : "1";
        return `https://pbs.twimg.com/media/${statusId}_${photoNum}.jpg`;
      }
      return url;
    }

    function renderGallery() {
      gallery.innerHTML = '';
      mediaList.forEach((url, index) => {
        const cleanUrl = extractImageUrl(url);
        const item = document.createElement('div');
        item.className = 'frame';
        item.dataset.index = index;

        const left = 10 + Math.random() * 78;
        const top = 8 + Math.random() * 68;
        const rotate = Math.random() * 12 - 6;

        item.style.left = `${left}%`;
        item.style.top = `${top}%`;
        item.style.transform = `rotate(${rotate}deg)`;
        item.style.zIndex = Math.floor(Math.random() * 10) + 5;

        item.innerHTML = `
          <div class="media-container">
            <img src="${cleanUrl}" onerror="this.src='https://picsum.photos/id/1015/600/600'">
          </div>
          <div class="delete-btn" onclick="deletePhoto(${index}); event.stopImmediatePropagation();">×</div>
        `;

        // حذف بالضغط المطول (يعمل بشكل أفضل على أندرويد)
        let timer;
        item.addEventListener('touchstart', () => {
          timer = setTimeout(() => {
            if (confirm('حذف هذه الصورة؟')) deletePhoto(index);
          }, 700);
        });
        item.addEventListener('touchend', () => clearTimeout(timer));

        gallery.appendChild(item);
      });
    }

    function addMedia() {
      let url = input.value.trim();
      if (!url) return;
      url = extractImageUrl(url);
      mediaList.unshift(url);
      localStorage.setItem('hauranGallery', JSON.stringify(mediaList));
      renderGallery();
      input.value = '';
    }

    function deletePhoto(index) {
      mediaList.splice(index, 1);
      localStorage.setItem('hauranGallery', JSON.stringify(mediaList));
      renderGallery();
    }

    input.addEventListener('keypress', e => { if (e.key === 'Enter') addMedia(); });

    function changeBackground() {
      const randomBg = backgrounds[Math.floor(Math.random() * backgrounds.length)];
      document.body.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.75)), url('${randomBg}')`;
    }

    // حركة جديدة: تبعثر + ريح + وميض ثم تصطف مرتبة (3 ثوانٍ)
    function animateOnRefresh() {
      const items = Array.from(gallery.children);
      
      // مرحلة 1: تبعثر مع ريح (3 ثوانٍ)
      items.forEach(item => {
        item.style.transition = 'all 3s cubic-bezier(0.4, 0, 0.2, 1)';
        const scatterX = (Math.random() - 0.5) * 900;
        const scatterY = (Math.random() - 0.5) * 500;
        item.style.transform = `translate(${scatterX}px, ${scatterY}px) rotate(${Math.random()*45 - 22}deg)`;
      });

      // مرحلة 2: بعد 3 ثوانٍ → تصطف مرتبة + وميض
      setTimeout(() => {
        renderGallery();
        // وميض بسيط
        gallery.style.transition = 'opacity 0.3s';
        gallery.style.opacity = '0.3';
        setTimeout(() => { gallery.style.opacity = '1'; }, 150);
      }, 3000);
    }

    window.onload = () => {
      changeBackground();
      renderGallery();
      setTimeout(animateOnRefresh, 600);
    };
  </script>
</body>
</html>
